name: CD - Develop

on:
  push:
    branches: [develop]

jobs:
  # ── Detect which services changed ─────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
            worker:
              - 'services/worker/**'

  # ── Build & push API image ─────────────────────────────────────────────────
  build-push-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ceasefire-api:develop
            ${{ secrets.DOCKERHUB_USERNAME }}/ceasefire-api:develop-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & push Worker image ──────────────────────────────────────────────
  build-push-worker:
    needs: detect-changes
    if: needs.detect-changes.outputs.worker == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ceasefire-worker:develop
            ${{ secrets.DOCKERHUB_USERNAME }}/ceasefire-worker:develop-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
