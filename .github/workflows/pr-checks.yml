name: PR Checks

on:
  pull_request:
    branches: [master, develop]

jobs:
  # ── Detect which services changed ─────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.filter.outputs.java }}
      python: ${{ steps.filter.outputs.python }}
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            java:
              - 'services/api/**'
              - '!services/api/src/main/resources/db/migration/**'
            python:
              - 'services/worker/**'
            db:
              - 'services/api/src/main/resources/db/migration/**'

  # ── Java / Spring Boot checks ──────────────────────────────────────────────
  java-checks:
    needs: detect-changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - uses: actions/checkout@v4

      - name: Skip if no Java changes
        if: needs.detect-changes.outputs.java != 'true'
        run: |
          echo "No changes in services/api — skipping Java checks."
          exit 0

      - uses: actions/setup-java@v4
        if: needs.detect-changes.outputs.java == 'true'
        with:
          java-version: "21"
          distribution: "temurin"

      # Matches Gradle version used in the API Dockerfile
      - uses: gradle/actions/setup-gradle@v4
        if: needs.detect-changes.outputs.java == 'true'
        with:
          gradle-version: "8.14"

      - name: Compile and run tests
        if: needs.detect-changes.outputs.java == 'true'
        run: gradle test

      - name: Docker build check
        if: needs.detect-changes.outputs.java == 'true'
        run: docker build .

  # ── Python / Worker checks ─────────────────────────────────────────────────
  python-checks:
    needs: detect-changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/worker

    steps:
      - uses: actions/checkout@v4

      - name: Skip if no Python changes
        if: needs.detect-changes.outputs.python != 'true'
        run: |
          echo "No changes in services/worker — skipping Python checks."
          exit 0

      - uses: actions/setup-python@v5
        if: needs.detect-changes.outputs.python == 'true'
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/worker/requirements.txt

      - name: Install dependencies
        if: needs.detect-changes.outputs.python == 'true'
        run: pip install -r requirements.txt

      - name: Lint with ruff
        if: needs.detect-changes.outputs.python == 'true'
        run: |
          pip install ruff
          ruff check .

      - name: Docker build check
        if: needs.detect-changes.outputs.python == 'true'
        run: docker build -t worker-check .

      - name: Verify worker boots (CI mode)
        if: needs.detect-changes.outputs.python == 'true'
        run: |
          docker run \
            -e CI=true \
            --env-file $GITHUB_WORKSPACE/.env.example \
            worker-check

  # ── Database / Migration checks ───────────────────────────────────────────
  db-checks:
    needs: detect-changes
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clipforge
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Skip if no migration changes
        if: needs.detect-changes.outputs.db != 'true'
        run: |
          echo "No changes in db/migration — skipping db checks."
          exit 0

      - uses: actions/setup-python@v5
        if: needs.detect-changes.outputs.db == 'true'
        with:
          python-version: "3.12"

      - name: Validate naming, duplicates and SQL security
        if: needs.detect-changes.outputs.db == 'true'
        run: python scripts/validate_migrations.py

      - name: Flyway dry-run
        if: needs.detect-changes.outputs.db == 'true'
        uses: docker://flyway/flyway:10
        with:
          args: >-
            -url=jdbc:postgresql://postgres:5432/clipforge
            -user=postgres
            -password=postgres
            -locations=filesystem:services/api/src/main/resources/db/migration
            migrate
