version: "3.9"

services:
  postgres:
    image: postgres
    environment:
      POSTGRES_DB: clipforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build:
      context: ../services/api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - rabbitmq
    env_file:
      - ../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clipforge
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq

  worker:
    build:
      context: ../services/worker
    depends_on:
      - rabbitmq
      - postgres
    env_file:
      - ../.env
