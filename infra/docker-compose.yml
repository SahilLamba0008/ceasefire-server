version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: clipforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build: ../services/api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clipforge

  worker:
    build: ../services/worker
    depends_on:
      - rabbitmq
      - postgres